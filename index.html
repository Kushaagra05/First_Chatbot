<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapse</title>
    <link rel="stylesheet" href="style.css?v=12">
    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Highlight.js for code syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-left">
                <div class="avatar">SY</div>
                <div class="header-title">
                    <h1>Synapse</h1>
                    <span class="subtitle">Your intelligent conversation partner</span>
                </div>
            </div>
            <div class="header-info">
                <span class="provider-badge" id="provider">OpenAI</span>
                <label class="mode-toggle">
                    <input type="checkbox" id="researchMode">
                    <span>🔬 Deep Analysis</span>
                </label>
                <button onclick="toggleDarkMode()" class="theme-btn" title="Toggle Dark Mode">🌓</button>
                <button onclick="clearChat()" class="clear-btn">Clear</button>
            </div>
        </div>

        <div class="messages-container" id="messages">
            <div class="welcome-message">
                <div class="welcome-avatar">SY</div>
                <h2>👋 Welcome to Synapse!</h2>
                <p>I'm Synapse, your intelligent AI assistant with advanced memory. Ask me anything and I'll help you with clear, informative responses.</p>
                <p class="mode-hint">💡 <strong>Deep Analysis Mode</strong> enables comprehensive multi-agent research</p>
            </div>
        </div>

        <form class="input-container" onsubmit="sendMessage(event)">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="Type your message..." 
                autocomplete="off"
                required
            >
            <button type="submit" id="sendBtn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                </svg>
            </button>
        </form>
    </div>

    <script src="app.js?v=12"></script>
</body>
</html>
